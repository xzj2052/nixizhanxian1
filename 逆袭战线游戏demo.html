<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>逆袭战线 - 三消游戏Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a}
body{display:flex;justify-content:center;align-items:center;font-family:'Microsoft YaHei','PingFang SC',sans-serif;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.game-wrapper{position:relative;overflow:hidden;background:linear-gradient(135deg,#0d1025 0%,#1a1040 50%,#0d1025 100%);border-radius:16px;box-shadow:0 0 80px rgba(80,60,200,.3),inset 0 0 60px rgba(0,0,0,.4);padding:8px;max-width:calc(100vw - 4px);max-height:calc(100vh - 4px)}
canvas{display:block;border-radius:10px;cursor:pointer;max-width:100%;max-height:100%;aspect-ratio:900/540;touch-action:manipulation;-webkit-touch-callout:none}
#force-panel{display:none;position:fixed;inset:0;z-index:1999;background:radial-gradient(ellipse at center,#1a1040 0%,#0a0a1a 100%);flex-direction:column;justify-content:center;align-items:center;gap:20px;text-align:center}
#force-panel h2{color:#FFD700;font-size:20px;letter-spacing:2px}
#force-panel p{color:#AAA;font-size:14px;max-width:280px;line-height:1.6}
#force-panel .btn{display:inline-block;padding:12px 32px;font-size:16px;font-weight:bold;color:#1a0a2e;background:linear-gradient(135deg,#FFD700,#FF8C00);border:none;border-radius:30px;cursor:pointer;box-shadow:0 0 24px rgba(255,215,0,.4)}
#force-panel .btn:active{transform:scale(.95)}
</style>
</head>
<body>
<div id="force-panel">
  <h2>请旋转手机</h2>
  <p>本游戏为横屏设计<br>将手机横放即可开始游玩</p>
  <button class="btn" id="btn-force-landscape">继续竖屏游玩</button>
  <p style="font-size:12px;color:#888">竖屏体验会打折扣</p>
</div>
<div class="game-wrapper"><canvas id="gameCanvas"></canvas></div>
<script>
(function(){
const CANVAS_W=900,CANVAS_H=540;
const ROWS=8,COLS=8,CELL=48,GAP=3;
const BOARD_W=COLS*(CELL+GAP)-GAP;
const BOARD_H=BOARD_W;
const BOARD_X=Math.floor((CANVAS_W-BOARD_W)/2);
const BOARD_Y=133;
const TYPES=6;
const TYPE_BOMB=6,TYPE_RAINBOW=7,TYPE_SHADOW=8;
const LINE_MAX=8,MIDPOINT=4;
const ENERGY_MAX=100;
const PRESSURE_MAX=100;
const BLOCK_COLORS=['#FF6B6B','#4ECDC4','#FFD93D','#A78BFA','#FB923C','#60A5FA'];
const BLOCK_LIGHT=['#FF9E9E','#7EDDD6','#FFE88A','#C4B5FD','#FDB77D','#93C5FD'];
const BLOCK_DARK=['#C0392B','#1ABC9C','#F39C12','#8E44AD','#D35400','#2980B9'];
const BLOCK_EMOJI=['⚔️','🛡️','🏇','🏹','🔫','🪓'];
const UNIT_NAMES=['剑兵','盾兵','骑兵','弓兵','火枪','战斧'];
const CAMP_X=22,CAMP_Y=20,CAMP_W=90,CAMP_H=110;
const CRYSTAL_X=CANVAS_W-112,CRYSTAL_Y=20,CRYSTAL_W=90,CRYSTAL_H=110;
const TRACK_X=CAMP_X+CAMP_W+14,TRACK_W=CRYSTAL_X-TRACK_X-14,TRACK_Y=65,TRACK_H=22;

const canvas=document.getElementById('gameCanvas');
canvas.width=CANVAS_W;canvas.height=CANVAS_H;
const ctx=canvas.getContext('2d');

// ===== 阶段 =====
var phase='start'; // start|playing|select|tutorial
var tutorialStep=0;
var highLevel=parseInt(localStorage.getItem('nz_level')||'1');
function saveHigh(){localStorage.setItem('nz_level',highLevel);}

// ===== 游戏状态 =====
var board=[],selectedRow=-1,selectedCol=-1;
var particles=[],floatingTexts=[],lineParticles=[];
var comboCount=0,totalMoves=0,score=0,level=1;
var battleLinePos=1,energy=0,enemyPressure=0,pressureAccum=0;
var consecutiveAdvances=0,nixiActive=false,nixiTimer=0;
var gameState=0; // 0=idle,1=selected,2=animating,3=over
var shakeAmount=0,animTime=0;
var lastSwapHadSpecial=false,lastLineParticleSpawn=0;
var isWin=false;
var pressureRate=4; // 随关卡变化的压力增速
var stormTimer=0; // 暗影风暴计时器
var startBtn=null,tutoNextBtn=null,selectBtns=[];

// ===== 10关战役配置 =====
var LEVEL_CONFIG=[
  {name:'新兵试练',desc:'光明堡新兵初上战场',pressure:2.5,startLine:2,shadow:0,shadowHP:2},          // 1
  {name:'山谷伏击',desc:'黑石谷遭遇伏兵',pressure:3.5,startLine:2,shadow:2,shadowHP:2},              // 2
  {name:'渡河之战',desc:'冥水河畔远程对射',pressure:4,startLine:2,shadow:1,shadowHP:2,disable:4},    // 3: 禁用火枪(红色)
  {name:'暴风前夜',desc:'敌军主力即将集结',pressure:5,startLine:1,shadow:4,shadowHP:2},              // 4
  {name:'深渊先锋',desc:'深渊骑士团出动',pressure:5.5,startLine:2,shadow:4,shadowHP:3},              // 5: 魔兵HP=3
  {name:'暗影风暴',desc:'暗渊塔释放风暴',pressure:6,startLine:1,shadow:4,shadowHP:2,storm:15},       // 6: 15秒风暴
  {name:'两面夹击',desc:'敌军绕后偷袭',pressure:3.5,startLine:3,shadow:2,shadowHP:2,boostRainbow:true},// 7: 彩虹增多
  {name:'骑士团长',desc:'白银团长领军冲锋',pressure:7,startLine:3,shadow:0,shadowHP:2,extraCharge:2}, // 8: 冲锋+2格
  {name:'暗渊要塞',desc:'攻至塔下近卫死守',pressure:8,startLine:1,shadow:6,shadowHP:4},             // 9
  {name:'攻破暗渊',desc:'最终决战！全军出击！',pressure:7,startLine:2,shadow:4,shadowHP:3,boss:true} // 10: BOSS标记
];

function rng(mn,mx){return Math.floor(Math.random()*(mx-mn+1))+mn}
function dist(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2)}
function drawRoundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}
}
function btnRect(x,y,w,h,text,color){
  drawRoundRect(x,y,w,h,14,color);
  ctx.fillStyle='#fff';ctx.font='bold 15px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,x+w/2,y+h/2+1);
  return {x:x,y:y,w:w,h:h};
}
function isInBtn(b,mx,my){return b&&mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h;}

// ===== 开始画面 =====
function drawStartScreen(){
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  var cx=CANVAS_W/2,cy=CANVAS_H/2-40;
  ctx.fillStyle='#FFD700';ctx.font='bold 42px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText('⚔ 逆袭战线 ⚔',cx,cy-55);
  ctx.font='15px "Microsoft YaHei"';ctx.fillText('光明堡 vs 暗渊塔 · 消除类战役',cx,cy-15);
  ctx.fillStyle='#AAA';ctx.font='12px "Microsoft YaHei"';
  ctx.fillText('集结部队  |  冲锋陷阵  |  逆袭翻盘',cx,cy+12);

  startBtn=btnRect(cx-90,cy+38,180,40,'▶  开始游戏','#FFD700');
  btnRect(cx-90,cy+90,180,40,'🎓  新手引导','rgba(255,255,255,0.15)');
  btnRect(cx-90,cy+142,180,40,'📋  选择关卡','rgba(255,255,255,0.12)');
  ctx.fillStyle='#666';ctx.font='11px "Microsoft YaHei"';
  ctx.fillText('点击相邻兵种交换  |  3个同兵种出击  |  4连得🪨投石车  |  5连得🧙法师',cx,cy+210);
}

// ===== 新手引导 =====
function drawTutorial(){
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  var cx=CANVAS_W/2,cy=CANVAS_H/2-20;
  if(tutorialStep===0){
    ctx.fillStyle='#FFD700';ctx.font='bold 22px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText('🎯 第一步：调兵遣将',cx,cy-60);
    ctx.fillStyle='#FFF';ctx.font='14px "Microsoft YaHei"';
    ctx.fillText('点击一个兵种选中它',cx,cy-15);
    ctx.fillText('再点击它相邻的兵种交换位置',cx,cy+15);
    var x1=BOARD_X+3*(CELL+GAP),y1=BOARD_Y+3*(CELL+GAP);
    var x2=BOARD_X+4*(CELL+GAP),y2=BOARD_Y+3*(CELL+GAP);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.roundRect(x1-3,y1-3,CELL+6,CELL+6,8);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.setLineDash([]);
    ctx.beginPath();ctx.roundRect(x2-3,y2-3,CELL+6,CELL+6,8);ctx.stroke();
    ctx.fillStyle='#AAA';ctx.font='11px "Microsoft YaHei"';
    ctx.fillText('1. 选中 →',x1+CELL/2,y1+CELL+20);
    ctx.fillText('2. 交换',x2+CELL/2,y2+CELL+20);
  }else if(tutorialStep===1){
    ctx.fillStyle='#FFD700';ctx.font='bold 22px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText('💎 第二步：部队出击',cx,cy-60);
    ctx.fillStyle='#FFF';ctx.font='14px "Microsoft YaHei"';
    ctx.fillText('凑齐 3 个同兵种即可出击得分',cx,cy-10);
    ctx.fillText('出击获得援军，推动战线前进',cx,cy+20);
    ctx.fillStyle='#4ECDC4';ctx.font='13px "Microsoft YaHei"';
    ctx.fillText('🤝 3连→出击  ⚡4连→🪨投石车  ⭐5连→🧙法师',cx,cy+60);
  }else if(tutorialStep===2){
    ctx.fillStyle='#FFD700';ctx.font='bold 22px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText('⚔ 第三步：战线推进',cx,cy-70);
    ctx.fillStyle='#FFF';ctx.font='14px "Microsoft YaHei"';
    ctx.fillText('援军满→战线向右推进1格（占领敌军据点）',cx,cy-30);
    ctx.fillText('推到最右侧即胜利 🎉',cx,cy-5);
    ctx.fillStyle='#FF6B6B';ctx.font='13px "Microsoft YaHei"';
    ctx.fillText('⚠ 敌军持续增援→战线后退→退回城堡则失守',cx,cy+30);
    ctx.fillStyle='#AA88CC';ctx.font='13px "Microsoft YaHei"';
    ctx.fillText('💀 魔兵（紫色🛡）需从旁边攻击2次才能消灭',cx,cy+55);
  }else if(tutorialStep===3){
    ctx.fillStyle='#FFD700';ctx.font='bold 22px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText('🌟 第四步：特殊兵种',cx,cy-70);
    ctx.fillStyle='#FFF';ctx.font='13px "Microsoft YaHei"';
    ctx.fillText('🪨 投石车：出击后砸毁3×3范围',cx,cy-25);
    ctx.fillText('🧙 法师：出击后传送同兵种全屏出击',cx,cy+0);
    ctx.fillStyle='#FF8C00';ctx.font='13px "Microsoft YaHei"';
    ctx.fillText('🎺 连续3次推进触发骑士团冲锋→清右列+额外推进',cx,cy+25);
    ctx.fillStyle='#FFD700';ctx.font='13px "Microsoft YaHei"';
    ctx.fillText('🌟 战线过半场触发曙光时刻→10秒援军翻倍',cx,cy+50);
  }

  var label=tutorialStep===3?'开始游戏！':'下一步 →';
  tutoNextBtn=btnRect(cx-70,CANVAS_H-60,140,36,label,'#FFD700');
  ctx.fillStyle='#777';ctx.font='11px "Microsoft YaHei"';
  ctx.fillText((tutorialStep+1)+'/4',cx,CANVAS_H-22);
}

// ===== 选关画面 =====
function drawLevelSelect(){
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  ctx.fillStyle='#FFD700';ctx.font='bold 24px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText('选择关卡',CANVAS_W/2,40);

  selectBtns=[];
  var cols=5,btnW=100,btnH=60,gapX=24,gapY=20;
  var startX=(CANVAS_W-(cols*btnW+(cols-1)*gapX))/2;
  for(var i=0;i<10;i++){
    var col=i%cols,row=Math.floor(i/cols);
    var bx=startX+col*(btnW+gapX),by=80+row*(btnH+gapY);
    var unlocked=i+1<=highLevel;
    var lcfg=LEVEL_CONFIG[i];
    var c=unlocked?'rgba(255,215,0,0.22)':'rgba(255,255,255,0.06)';
    var s=unlocked?'rgba(255,215,0,0.5)':'rgba(255,255,255,0.1)';
    drawRoundRect(bx,by,btnW,btnH,12,c,s);
    ctx.fillStyle=unlocked?'#FFD700':'#555';ctx.font='bold 18px "Microsoft YaHei"';
    ctx.fillText('第'+(i+1)+'关',bx+btnW/2,by+btnH/2-10);
    ctx.font='10px "Microsoft YaHei"';
    ctx.fillText(unlocked?lcfg.name:'🔒',bx+btnW/2,by+btnH/2+14);
    if(unlocked)selectBtns.push({x:bx,y:by,w:btnW,h:btnH,id:'level_'+i,level:i+1});
  }
  var back=btnRect(CANVAS_W/2-70,CANVAS_H-50,140,36,'← 返回','rgba(255,255,255,0.15)');
  selectBtns.push(back);
}

// ===== 触发教程 =====
function startTutorial(){
  phase='tutorial';tutorialStep=0;
  createBoard();
  var m=findMatches();if(m.matched.size>0)createBoard();
}

// ===== 棋盘逻辑 =====
function initCell(type,extra){var hp=2;if(extra&&extra.hp)hp=extra.hp;return {type:type,offsetY:0,opacity:1,scale:1,special:0,shadowHP:(type===TYPE_SHADOW?hp:0),swapOffsetX:0,swapOffsetY:0,flashTimer:0,dropBounce:0,extra:extra};}
function createBoard(){
  var cfg=LEVEL_CONFIG[Math.min(level-1,LEVEL_CONFIG.length-1)]||LEVEL_CONFIG[0];
  board=[];for(var r=0;r<ROWS;r++){board[r]=[];for(var c=0;c<COLS;c++){var t;do{t=rng(0,TYPES-1)}while(wouldMatch(r,c,t));if(cfg.disable!==undefined&&t===cfg.disable){do{t=rng(0,TYPES-1)}while(t===cfg.disable||wouldMatch(r,c,t));}board[r][c]=initCell(t);}}spawnShadowObstacles();
}
function wouldMatch(r,c,type){
  if(type>=TYPES)return false;
  if(c>=2&&board[r][c-1]&&board[r][c-2]&&board[r][c-1].type===type&&board[r][c-2].type===type)return true;
  if(r>=2&&board[r-1]&&board[r-2]&&board[r-1][c]&&board[r-2][c]&&board[r-1][c].type===type&&board[r-2][c].type===type)return true;
  return false;
}
function spawnShadowObstacles(){
  var ss=Math.max(0,battleLinePos);if(ss>=COLS)return;
  var cfg=LEVEL_CONFIG[Math.min(level-1,LEVEL_CONFIG.length-1)]||LEVEL_CONFIG[0];
  var count=rng(1,Math.min(3,1+Math.floor(level/3)));
  for(var i=0;i<count;i++){var c=rng(ss,COLS-1),r=rng(0,ROWS-1);if(board[r]&&board[r][c]&&board[r][c].type<TYPES&&board[r][c].shadowHP===0)board[r][c]=initCell(TYPE_SHADOW,{hp:cfg.shadowHP});}
}
function findMatches(){
  var matched=new Set(),matchGroups=[];
  for(var r=0;r<ROWS;r++){var c=0;while(c<COLS){var cell=board[r][c];if(!cell||cell.type>=TYPES){c++;continue;}var end=c;while(end+1<COLS&&board[r][end+1]&&board[r][end+1].type===cell.type)end++;var len=end-c+1;if(len>=3){var g={cells:[],length:len,type:cell.type,horizontal:true};for(var i=c;i<=end;i++){var k=r*COLS+i;matched.add(k);g.cells.push({r:r,c:i});}matchGroups.push(g);}c=end+1;}}
  for(var c=0;c<COLS;c++){var r=0;while(r<ROWS){var cell=board[r][c];if(!cell||cell.type>=TYPES){r++;continue;}var end=r;while(end+1<ROWS&&board[end+1][c]&&board[end+1][c].type===cell.type)end++;var len=end-r+1;if(len>=3){var g={cells:[],length:len,type:cell.type,horizontal:false};for(var i=r;i<=end;i++){var k=i*COLS+c;matched.add(k);g.cells.push({r:i,c:c});}matchGroups.push(g);}r=end+1;}}
  return {matched:matched,matchGroups:matchGroups};
}
function processShadowBlocks(toRemove){
  var sa=new Set();
  for(var key of toRemove){var r=Math.floor(key/COLS),c=key%COLS;for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){if(Math.abs(dr)+Math.abs(dc)!==1)continue;var nr=r+dr,nc=c+dc;if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;var idx=nr*COLS+nc;if(board[nr][nc]&&board[nr][nc].type===TYPE_SHADOW&&!toRemove.has(idx)){board[nr][nc].shadowHP--;if(board[nr][nc].shadowHP<=0)toRemove.add(idx);else{sa.add(idx);spawnFloatingText(BOARD_X+nc*(CELL+GAP)+CELL/2,BOARD_Y+nr*(CELL+GAP),'💀裂','#AA88CC');}}}}
  return toRemove;
}
function processSpecialBlocks(matchedSet,matchGroups){
  var toRemove=new Set(matchedSet);
  for(var i=0;i<matchGroups.length;i++){var g=matchGroups[i];var mid=g.cells[Math.floor(g.cells.length/2)];var inLight=mid.c<battleLinePos;var cfg=LEVEL_CONFIG[Math.min(level-1,LEVEL_CONFIG.length-1)]||LEVEL_CONFIG[0];var roll=Math.random(),base=cfg.boostRainbow?0.7:0.5,lb=inLight?0.05:0;if(g.length===4&&roll<base+lb){board[mid.r][mid.c].special=1;board[mid.r][mid.c].type=TYPE_BOMB;toRemove.delete(mid.r*COLS+mid.c);}else if(g.length>=5&&roll<base+lb){board[mid.r][mid.c].special=2;board[mid.r][mid.c].type=TYPE_RAINBOW;toRemove.delete(mid.r*COLS+mid.c);}}
  for(var key of toRemove){var r=Math.floor(key/COLS),c=key%COLS;if(board[r][c]&&board[r][c].type===TYPE_BOMB&&board[r][c].special===1){for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){var nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)toRemove.add(nr*COLS+nc);}spawnBombParticles(r,c);}}
  for(var key of toRemove){var r=Math.floor(key/COLS),c=key%COLS;if(board[r][c]&&board[r][c].type===TYPE_RAINBOW&&board[r][c].special===2){var tc=-1;for(var k2 of toRemove){var r2=Math.floor(k2/COLS),c2=k2%COLS;if(board[r2][c2]&&board[r2][c2].type<TYPES&&!(r2===r&&c2===c)){tc=board[r2][c2].type;break;}}if(tc>=0){for(var rr=0;rr<ROWS;rr++)for(var cc=0;cc<COLS;cc++)if(board[rr][cc]&&board[rr][cc].type===tc)toRemove.add(rr*COLS+cc);}spawnRainbowParticles(r,c);}}
  for(var key of toRemove){var r=Math.floor(key/COLS),c=key%COLS;if(board[r][c])board[r][c].special=0;}
  return toRemove;
}
function removeAndCollapse(toRemove){
  // 同步检测炸弹/彩虹（在 flashing 前确定）
  var bt=false,rt=false;
  for(var key of toRemove){var r=Math.floor(key/COLS),c=key%COLS;if(!board[r][c])continue;if(board[r][c].type===TYPE_BOMB)bt=true;if(board[r][c].type===TYPE_RAINBOW)rt=true;}
  // Phase 1: 闪烁 + 粒子
  for(var key of toRemove){var r=Math.floor(key/COLS),c=key%COLS;if(!board[r][c])continue;board[r][c].flashTimer=0.3;board[r][c].scale=1.4;board[r][c].opacity=1;spawnMatchParticles(r,c,board[r][c].type);}
  // Phase 2: 延迟删除 + 下落 + 新方块入场
  setTimeout(function(){
    for(var key of toRemove){var r=Math.floor(key/COLS),c=key%COLS;if(!board[r][c])continue;board[r][c]=null;}
    for(var c=0;c<COLS;c++){
      var wr=ROWS-1,fallCount=0;
      for(var r=ROWS-1;r>=0;r--){
        if(board[r][c]!==null){
          if(r!==wr){board[wr][c]=board[r][c];board[wr][c].offsetY=(wr-r)*(CELL+GAP);board[wr][c].dropBounce=1;board[r][c]=null;}wr--;
        }else{fallCount++;}
      }
      for(var r=wr;r>=0;r--){
        board[r][c]=initCell(rng(0,TYPES-1));
        board[r][c].offsetY=-(fallCount+(wr-r))*(CELL+GAP);
        board[r][c].dropBounce=1;board[r][c].scale=0.5;
      }
    }
  },200);
  return {removed:toRemove.size,bombTriggered:bt,rainbowTriggered:rt};
}

function handleClick(row,col){

  if(board[row][col].type===TYPE_SHADOW){if(selectedRow>=0){selectedRow=-1;selectedCol=-1;gameState=0;}return;}

   drawLightCastle();drawDarkTower();drawBattleLineTrack();drawInfoBars();

   if(battleLinePos<COLS){var sx2=BOARD_X+(battleLinePos/COLS)*bw2;ctx.fillStyle='rgba(80,20,120,0.08)';ctx.fillRect(sx2,BOARD_Y-8,BOARD_X+bw2+8-sx2,bh2+16);}
   drawRoundRect(BOARD_X-8,BOARD_Y-8,bw2+16,bh2+16,12,'rgba(0,0,0,0.45)','rgba(255,255,255,0.08)');
   for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(board[r][c])drawBlock(r,c,board[r][c]);
   // selection
   if(selectedRow>=0&&gameState===1){
     var sx3=BOARD_X+selectedCol*(CELL+GAP),sy3=BOARD_Y+selectedRow*(CELL+GAP),pulse=Math.sin(animTime*3)*0.3+0.7;
     ctx.strokeStyle='rgba(255,215,0,'+pulse+')';ctx.lineWidth=3;drawRoundRect(sx3-3,sy3-3,CELL+6,CELL+6,11,null,'rgba(255,215,0,'+pulse+')');
     for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){if(Math.abs(dr)+Math.abs(dc)!==1)continue;var nr=selectedRow+dr,nc=selectedCol+dc;if(nr<0||nr>=ROWS||nc<0||nc>=COLS||(board[nr][nc]&&board[nr][nc].type===TYPE_SHADOW))continue;var nx2=BOARD_X+nc*(CELL+GAP),ny2=BOARD_Y+nr*(CELL+GAP);drawRoundRect(nx2-1,ny2-1,CELL+2,CELL+2,11,null,'rgba(255,255,255,0.4)');}

   var cfg=LEVEL_CONFIG[Math.min(level-1,LEVEL_CONFIG.length-1)]||LEVEL_CONFIG[0];

   ctx.font='bold 12px "Microsoft YaHei"';ctx.fillText('第'+level+'关 · '+cfg.name,CANVAS_W/2,32);
   ctx.font='bold 13px "Microsoft YaHei"';ctx.textAlign='left';ctx.fillText('⭐ '+score,12,30);ctx.textAlign='right';ctx.fillText('步数:'+totalMoves,CANVAS_W-12,30);
   // particles
   for(var i=0;i<particles.length;i++){var p=particles[i];ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.01,p.size*p.life),0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
   for(var i=0;i<floatingTexts.length;i++){var ft=floatingTexts[i];ctx.globalAlpha=Math.max(0,ft.life);ctx.fillStyle=ft.color;ctx.font='bold 13px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText(ft.text,ft.x,ft.y);}ctx.globalAlpha=1;
   // grid
   ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;for(var r=0;r<=ROWS;r++){var y2=BOARD_Y+r*(CELL+GAP)-GAP/2;ctx.beginPath();ctx.moveTo(BOARD_X,y2);ctx.lineTo(BOARD_X+bw2,y2);ctx.stroke();}for(var c=0;c<=COLS;c++){var x3=BOARD_X+c*(CELL+GAP)-GAP/2;ctx.beginPath();ctx.moveTo(x3,BOARD_Y);ctx.lineTo(x3,BOARD_Y+bh2);ctx.stroke();}
   // game over
   if(gameState===3){
     ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);var pw=320,ph=160,px2=(CANVAS_W-pw)/2,py2=(CANVAS_H-ph)/2;drawRoundRect(px2,py2,pw,ph,14,'rgba(20,20,60,0.95)','rgba(255,215,0,0.6)');
     if(isWin){var wg=ctx.createRadialGradient(CANVAS_W/2,CANVAS_H/2,0,CANVAS_W/2,CANVAS_H/2,CANVAS_W/2);wg.addColorStop(0,'rgba(255,215,0,0.2)');wg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=wg;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);}
     ctx.fillStyle=isWin?'#FFD700':'#FF6B6B';ctx.font='bold 24px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText(isWin?'🎉 战役胜利！敌军溃散！':'💔 城堡沦陷',px2+pw/2,py2+45);ctx.fillStyle='#FFF';ctx.font='14px "Microsoft YaHei"';ctx.fillText('积分:'+score+'  步数:'+totalMoves,px2+pw/2,py2+72);
     var btnW2=120,bh3=36,bx3=px2+(pw-btnW2)/2,by3=py2+95;
     if(!isWin){drawRoundRect(bx3-65,by3,btnW2,bh3,18,'#FF6B6B','#FFF');ctx.fillStyle='#FFF';ctx.font='bold 13px "Microsoft YaHei"';ctx.fillText('📜 援军文书',bx3-65+btnW2/2,by3+bh3/2+5);drawRoundRect(bx3+65,by3,btnW2,bh3,18,'#4ECDC4','#FFF');ctx.fillText('🔄 重整旗鼓',bx3+65+btnW2/2,by3+bh3/2+5);canvas._reviveBtn={x:bx3-65,y:by3,w:btnW2,h:bh3};canvas._restartBtn={x:bx3+65,y:by3,w:btnW2,h:bh3};}

// ===== 更新 =====
function update(dt){
 animTime+=dt;
 if(phase==='playing'){
   if(nixiActive){nixiTimer-=dt;if(nixiTimer<=0){nixiActive=false;nixiTimer=0;spawnFloatingText(CANVAS_W/2,BOARD_Y-64,'曙光消散','#FFD700');}}
   // 暗影风暴关卡：定时触发冲击
   var cfg=LEVEL_CONFIG[Math.min(level-1,LEVEL_CONFIG.length-1)]||LEVEL_CONFIG[0];
   if(cfg.storm&&gameState!==3){
     stormTimer+=dt;
     if(stormTimer>=cfg.storm){stormTimer=0;pressureAccum=PRESSURE_MAX-1;spawnFloatingText(CANVAS_W/2,BOARD_Y-36,'🌀 风暴来袭！','#FF6B6B');shakeAmount=8;}
   }
   if(gameState!==3){
     pressureAccum+=pressureRate*dt;
     if(pressureAccum>=PRESSURE_MAX){pressureAccum=0;enemyPressure=0;battleLinePos=Math.max(0,battleLinePos-1);consecutiveAdvances=0;if(battleLinePos<=0)endGame(false);else{spawnFloatingText(CANVAS_W/2,BOARD_Y-32,'🌀 暗影风暴！','#FF6B6B');shakeAmount=6;setTimeout(function(){if(gameState!==3)spawnShadowObstacles();},500);}}
     enemyPressure=(pressureAccum/PRESSURE_MAX)*100;
     if(battleLinePos>=LINE_MAX&&gameState!==3)endGame(true);
   }
 }
 for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}
 for(var i=floatingTexts.length-1;i>=0;i--){floatingTexts[i].y+=floatingTexts[i].vy;floatingTexts[i].life-=.018;if(floatingTexts[i].life<=0)floatingTexts.splice(i,1);}
 for(var r=0;r<ROWS;r++){if(!board[r])continue;for(var c=0;c<COLS;c++){var cell=board[r][c];if(!cell)continue;
   // 闪烁计时器
   if(cell.flashTimer>0){cell.flashTimer-=dt;if(cell.flashTimer<=0){cell.flashTimer=0;cell.scale=1;cell.opacity=1;}}
   // 下落动画（带弹跳）
   if(cell.offsetY&&Math.abs(cell.offsetY)>0.5){
     cell.offsetY*=0.75;
     if(cell.dropBounce&&Math.abs(cell.offsetY)<10&&cell.dropBounce>0){
       cell.offsetY*=-0.3;cell.dropBounce=-1;
     }
     if(Math.abs(cell.offsetY)<0.5)cell.offsetY=0;
   }
   // scale 弹跳（新方块入场）
   if(cell.scale&&cell.scale!==1&&!cell.flashTimer){
     if(cell.scale<1){cell.scale=Math.min(1,cell.scale+dt*8);}
     else{cell.scale+=(1-cell.scale)*0.25;}
     if(Math.abs(cell.scale-1)<0.005)cell.scale=1;
   }
   if(cell.opacity&&cell.opacity!==1){cell.opacity=Math.min(1,cell.opacity+dt*5);}
 }}
 if(shakeAmount>0.1)shakeAmount*=.85;else shakeAmount=0;
}

function getGridPos(cx,cy){
  var rect=canvas.getBoundingClientRect();
  var sx=CANVAS_W/rect.width,sy=CANVAS_H/rect.height;
  var mx=(cx-rect.left)*sx,my=(cy-rect.top)*sy;

  if(gameState===3){
    if(canvas._reviveBtn&&isInBtn(canvas._reviveBtn,mx,my)){reviveGame();return null;}
    if(canvas._restartBtn&&isInBtn(canvas._restartBtn,mx,my)){restartGame();return null;}
    if(canvas._nextBtn&&isInBtn(canvas._nextBtn,mx,my)){nextLevel();return null;}
    if(canvas._selectBtn&&isInBtn(canvas._selectBtn,mx,my)){phase='select';return null;}
  }
  // 非游玩状态，点击按钮
  if(phase==='start'){
    if(isInBtn(startBtn,mx,my)){phase='playing';createBoard();var m=findMatches();if(m.matched.size>0)createBoard();return null;}
    // 按钮检测顺序与绘制顺序一致：开始、引导、选关
    var btns=[{y:CANVAS_H/2-40+38,h:40},{y:CANVAS_H/2-40+90,h:40},{y:CANVAS_H/2-40+142,h:40}];
    var cx2=CANVAS_W/2;
    for(var i=0;i<btns.length;i++){var by2=btns[i].y;if(mx>=cx2-90&&mx<=cx2+90&&my>=by2&&my<=by2+40){
      if(i===1){startTutorial();return null;}
      if(i===2){phase='select';return null;}
    }}
  }
  if(phase==='tutorial'){
    if(isInBtn(tutoNextBtn,mx,my)){
      tutorialStep++;
      if(tutorialStep>=4){phase='playing';createBoard();var m=findMatches();if(m.matched.size>0)createBoard();}return null;
    }
  }
  if(phase==='select'){
    for(var i=0;i<selectBtns.length;i++){var b=selectBtns[i];if(isInBtn(b,mx,my)){
      if(b.id==='back'){phase='start';return null;}
      if(b.level){level=b.level;phase='playing';restartGame();return null;}
    }}
  }
  // 游戏中的棋盘点击
  if(phase==='playing'){
    var col=Math.floor((mx-BOARD_X)/(CELL+GAP)),row=Math.floor((my-BOARD_Y)/(CELL+GAP));
    var cx3=BOARD_X+col*(CELL+GAP),cy3=BOARD_Y+row*(CELL+GAP);
    if(mx>=cx3&&mx<=cx3+CELL&&my>=cy3&&my<=cy3+CELL&&row>=0&&row<ROWS&&col>=0&&col<COLS)return {row:row,col:col};
  }
  return null;
}

canvas.addEventListener('click',function(e){e.preventDefault();var p=getGridPos(e.clientX,e.clientY);if(p)handleClick(p.row,p.col);});
canvas.addEventListener('touchstart',function(e){e.preventDefault();if(e.touches.length===1){var p=getGridPos(e.touches[0].clientX,e.touches[0].clientY);if(p)handleClick(p.row,p.col);}});

var lastTime=performance.now();
function gameLoop(ts){
  var dt=Math.min((ts-lastTime)/1000,0.1);lastTime=ts;
  update(dt);render();
  requestAnimationFrame(gameLoop);
}

function init(){
   createBoard(); // 初始化空棋盘用于默认渲染
   lastTime=performance.now();requestAnimationFrame(gameLoop);

  var panel=document.getElementById('force-panel');
  var wrapper=document.querySelector('.game-wrapper');
  function updateUI(){
    if(window.innerWidth>window.innerHeight){panel.style.display='none';wrapper.style.display='';}
    else{panel.style.display='flex';wrapper.style.display='none';}
  }
  document.getElementById('btn-force-landscape').addEventListener('click',function(){panel.style.display='none';wrapper.style.display='';});
  updateUI();window.addEventListener('resize',updateUI);
  window.addEventListener('orientationchange',function(){setTimeout(updateUI,200);setTimeout(updateUI,600);});
  if(typeof screen!=='undefined'&&screen.orientation&&screen.orientation.lock){screen.orientation.lock('landscape').catch(function(){});}
}
init();

console.log('  ✅ 关卡名显示 + 选关可见关卡名');
console.log('  ✅ 第3关禁用火枪 | 第5关魔兵HP+ | 第6关风暴 | 第7关法师加成 | 第8关冲锋+2');
})();
